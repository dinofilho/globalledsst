<!DOCTYPE html>

  <style>
    :root{

      --card:#102727;
      --borda:#245f5f;

    *{box-sizing:border-box}

    body{

      width:100%;
      height:280px;

    .btn{
      display:inline-block;

      border-radius:12px;

      background:#00d8a6;
      color:#000;
    }

    .btn-secondary{
      background:#102727;
      border:1px solid #2c7777;
      color:#fff;
    }

    .galeria{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:12px;
      margin-top:20px;
    }

    .galeria img{
      width:100%;
      height:200px;
