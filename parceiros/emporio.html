<!DOCTYPE html>

  <style>
    :root{
      --verde:#19b79a;

      --card:#102727;
      --borda:#245f5f;
      --texto:#ffffff;
      --texto2:#d7f3ee;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font:16px/1.5 system-ui;
      background:linear-gradient(135deg,#071313,#0d2323);
      color:#fff;
    }

    .wrap{max-width:1100px;margin:auto;padding:18px}

      border:1px solid #245f5f;

    }

    .hero img{

      height:280px;
      object-fit:cover;
      display:block;
    }

    .hero-content{padding:20px}

    h1{margin:0 0 10px}
    h2{margin:28px 0 12px}

    .btn{
      display:inline-block;
      padding:12px 16px;
      border-radius:12px;
      text-decoration:none;
      font-weight:bold;
      margin-top:10px;
      margin-right:8px;
    }

    .btn-primary{
      background:#00d8a6;
      color:#000;
    }

    .btn-secondary{
      background:#102727;
      border:1px solid #2c7777;
      color:#fff;
    }

    .galeria{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:12px;
      margin-top:20px;
    }

    .galeria img{
      width:100%;
      height:220px;
      object-fit:cover;
      border-radius:12px;
      display:block;
    }

    .mapa{
      width:100%;
      height:300px;
      border-radius:12px;
      margin-top:20px;
      border:0;
    }
  </style>
</head>
